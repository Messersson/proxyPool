<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProxyPool 配置中心</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f766e;
      --brand-2: #115e59;
      --warn: #b45309;
      --danger: #b91c1c;
      --ok: #047857;
      --chip: #ecfeff;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 28%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .field.full { grid-column: 1 / -1; }
    label {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .help {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    input[type="text"],
    input[type="number"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }
    input:disabled, textarea:disabled, select:disabled {
      background: #f3f4f6;
      color: #6b7280;
      cursor: not-allowed;
    }
    textarea { min-height: 72px; resize: vertical; }
    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      background: var(--chip);
      color: var(--brand-2);
      border: 1px solid #a5f3fc;
    }
    .chip.env { background: #fff7ed; color: var(--warn); border-color: #fed7aa; }
    .chip.restart { background: #fef2f2; color: var(--danger); border-color: #fecaca; }
    .chip.default { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    button, .btn {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
    .btn-primary:hover { background: var(--brand-2); }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn-secondary:hover { background: #d1d5db; }
    .status {
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.ok { color: var(--ok); font-weight: 600; }
    .status.err { color: var(--danger); font-weight: 600; }
    .token-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .meta .item {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .meta .k { color: var(--muted); font-size: 12px; }
    .meta .v { margin-top: 4px; font-size: 13px; word-break: break-all; }
    .footer-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 800px) {
      .grid, .meta, .token-box { grid-template-columns: 1fr; }
      header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>ProxyPool 配置中心</h1>
        <div class="sub">修改后点「保存配置」会写入本地文件并立即热加载。环境变量覆盖的项会被锁定。</div>
      </div>
      <div class="toolbar">
        <a class="btn btn-secondary" href="/">API 列表</a>
        <a class="btn btn-secondary" href="/health/">健康检查</a>
      </div>
    </header>

    <section class="card">
      <h2>访问凭证</h2>
      <div class="token-box">
        <div class="field">
          <label for="adminToken">当前请求 Token（可选）</label>
          <input id="adminToken" type="password" placeholder="若启用了 API_TOKEN，这里填同一个值" autocomplete="off" />
          <div class="help">会随请求头 X-API-Token 发送；仅保存在浏览器内存，不会写回服务器文件之外。</div>
        </div>
        <button type="button" class="btn btn-secondary" id="btnReload">重新加载</button>
      </div>
      <div class="meta">
        <div class="item"><div class="k">配置文件</div><div class="v" id="metaFile">-</div></div>
        <div class="item"><div class="k">文件状态</div><div class="v" id="metaExists">-</div></div>
        <div class="item"><div class="k">统计</div><div class="v" id="metaStats">-</div></div>
      </div>
    </section>

    <form id="configForm">
      <div id="groups"></div>
      <section class="card">
        <div class="actions">
          <div class="status" id="status">准备就绪</div>
          <div class="btn-row">
            <button type="button" class="btn btn-secondary" id="btnReset">恢复当前值</button>
            <button type="submit" class="btn btn-primary" id="btnSave">保存配置</button>
          </div>
        </div>
        <div class="footer-note">
          优先级：环境变量 &gt; 网页保存的 runtime 配置 &gt; setting.py 默认值。
          标记“需重启”的项保存后会写入文件，但调度间隔等要重启 schedule 进程才完全生效。
        </div>
      </section>
    </form>
  </div>

  <script>
    const groupsEl = document.getElementById("groups");
    const formEl = document.getElementById("configForm");
    const statusEl = document.getElementById("status");
    const tokenEl = document.getElementById("adminToken");
    let currentFields = [];

    function headers() {
      const h = { "Content-Type": "application/json" };
      const token = tokenEl.value.trim();
      if (token) h["X-API-Token"] = token;
      return h;
    }

    function setStatus(text, type) {
      statusEl.textContent = text || "";
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function sourceChip(source) {
      if (source === "env") return '<span class="chip env">环境变量</span>';
      if (source === "runtime") return '<span class="chip">已保存</span>';
      return '<span class="chip default">默认</span>';
    }

    function groupBy(fields) {
      const map = new Map();
      fields.forEach((f) => {
        if (!map.has(f.group)) map.set(f.group, []);
        map.get(f.group).push(f);
      });
      return map;
    }

    function renderFields(fields) {
      currentFields = fields;
      groupsEl.innerHTML = "";
      const grouped = groupBy(fields);
      grouped.forEach((list, groupName) => {
        const section = document.createElement("section");
        section.className = "card";
        section.innerHTML = `<h2>${groupName}</h2><div class="grid"></div>`;
        const grid = section.querySelector(".grid");
        list.forEach((f) => {
          const full = f.type === "list" || f.key === "DB_CONN" || f.key === "HTTP_URL" || f.key === "HTTPS_URL";
          const wrap = document.createElement("div");
          wrap.className = "field" + (full ? " full" : "");
          const chips = [
            sourceChip(f.source),
            f.restart_required ? '<span class="chip restart">需重启</span>' : "",
            f.locked ? '<span class="chip env">已锁定</span>' : "",
          ].join(" ");
          let control = "";
          if (f.type === "bool") {
            control = `
              <select id="f_${f.key}" name="${f.key}" ${f.locked ? "disabled" : ""}>
                <option value="true" ${f.value === true || f.value === "true" ? "selected" : ""}>开启</option>
                <option value="false" ${f.value === false || f.value === "false" ? "selected" : ""}>关闭</option>
              </select>`;
          } else if (f.type === "list") {
            control = `<textarea id="f_${f.key}" name="${f.key}" ${f.locked ? "disabled" : ""} placeholder="逗号分隔">${escapeHtml(f.value || "")}</textarea>`;
          } else if (f.type === "password") {
            control = `<input id="f_${f.key}" name="${f.key}" type="password" value="${escapeAttr(f.value || "")}" ${f.locked ? "disabled" : ""} autocomplete="new-password" />`;
          } else if (f.type === "int") {
            control = `<input id="f_${f.key}" name="${f.key}" type="number" value="${escapeAttr(f.value)}" ${f.locked ? "disabled" : ""} />`;
          } else {
            control = `<input id="f_${f.key}" name="${f.key}" type="text" value="${escapeAttr(f.value || "")}" ${f.locked ? "disabled" : ""} />`;
          }
          wrap.innerHTML = `
            <label for="f_${f.key}">${escapeHtml(f.label)} ${chips}</label>
            ${control}
            <div class="help">${escapeHtml(f.help || "")}</div>
          `;
          grid.appendChild(wrap);
        });
        groupsEl.appendChild(section);
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replaceAll("'", "&#39;");
    }

    async function loadConfig() {
      setStatus("加载中...");
      const resp = await fetch("/admin/config/api", { headers: headers() });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        setStatus(data.src || ("加载失败: " + resp.status), "err");
        return;
      }
      document.getElementById("metaFile").textContent = data.file || "-";
      document.getElementById("metaExists").textContent = data.exists ? "已有保存文件" : "尚未保存过（使用默认值）";
      document.getElementById("metaStats").textContent = "字段 " + (data.fields || []).length + " 项";
      renderFields(data.fields || []);
      setStatus("已加载当前生效配置", "ok");
    }

    function collectPayload() {
      const payload = {};
      currentFields.forEach((f) => {
        if (f.locked) return;
        const el = document.getElementById("f_" + f.key);
        if (!el) return;
        let val = el.value;
        if (f.type === "bool") val = val === "true";
        if (f.type === "int") val = Number(val);
        if (f.type === "password" && (val === "********" || val === "")) {
          // 保留原值：不提交密码掩码
          return;
        }
        payload[f.key] = val;
      });
      return payload;
    }

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = collectPayload();
      setStatus("保存中...");
      const resp = await fetch("/admin/config/api", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify(payload),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        setStatus(data.src || ("保存失败: " + resp.status), "err");
        return;
      }
      const restart = (data.restart_required || []).join(", ");
      setStatus(
        restart
          ? "已保存并热加载。以下项建议重启进程: " + restart
          : "已保存并热加载生效",
        "ok"
      );
      await loadConfig();
    });

    document.getElementById("btnReload").addEventListener("click", loadConfig);
    document.getElementById("btnReset").addEventListener("click", loadConfig);
    loadConfig().catch((err) => setStatus(String(err), "err"));
  </script>
</body>
</html>
